services:
  - type: web
    name: cleartext-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cleartext-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cleartext-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        value: your-super-secret-key-change-this
      - key: JWT_ALGORITHM
        value: HS256
      - key: RATE_LIMIT
        value: 10/minute
      - key: CACHE_TTL
        value: "3600"

  - type: worker
    name: cleartext-worker
    runtime: docker
    dockerfilePath: ./worker/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cleartext-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cleartext-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        value: your-super-secret-key-change-this
      - key: JWT_ALGORITHM
        value: HS256
      - key: RATE_LIMIT
        value: 10/minute
      - key: CACHE_TTL
        value: "3600"

  - type: redis
    name: cleartext-redis
    plan: free
    ipAllowList: []

databases:
  - name: cleartext-db
    plan: free
